version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: assetflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow123
      POSTGRES_DB: assetflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - assetflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow -d assetflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AssetFlow API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: assetflow_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://assetflow:assetflow123@postgres:5432/assetflow_db?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-assetflow_access_secret_key_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-assetflow_refresh_secret_key_change_in_prod}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BCRYPT_ROUNDS: 12
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assetflow_network

  # Adminer (Database UI)
  adminer:
    image: adminer:4
    container_name: assetflow_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - assetflow_network

volumes:
  postgres_data:
    driver: local

networks:
  assetflow_network:
    driver: bridge
